# Resource registry for the <name> pipeline, read by
# cli/estimate_resources.py at submit time. Just fill in real values, no
# code to write.
#
# Fields per stage:
#   partition   Slurm partition this stage's jobs target.
#   exclusive   request the whole node -- usually false.
#   cores/mem_gb:
#     formula   Python expression evaluated against the stage's metadata
#               dict (e.g. `n_sessions * 50`), or null to just use fallback.
#     min/max   clamps applied after the formula (min defaults to 1).
#     fallback  used when formula is null or fails to evaluate.

stages:
  example-stage:
    partition: normal
    exclusive: false
    cores:
      formula: null
      min: 1
      max: 32
      fallback: 4
    mem_gb:
      formula: null
      min: 1
      max: 64
      fallback: 8
