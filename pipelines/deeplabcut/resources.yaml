# Resource registry for the deeplabcut pipeline.
# Read by estimate_resources.py (imported by submit_dlc.py at submission time).
#
# Nine stages here are the ones actually submitted via sbatch -- `init` and
# `add-videos` are lightweight bookkeeping run inline on the login node, no
# resources.yaml entry needed (same as moseq's init/pull). `label-frames`/
# `refine-labels`/manual-mode `extract-frames` are GUI-only and run from a
# notebook, never through `run deeplabcut`, so they have no entry either.
#
# Formulas reference metadata collected cheaply at submit time:
#   extract-frames:          n_videos (count of videos in config.yaml)
#   create-training-dataset: (no metadata yet -- fixed cost regardless of dataset size)
#   train:                   num_iter (training iteration count, from CLI args)
#   evaluate/analyze-videos: n_videos
#   extract-outlier-frames:  n_videos
#   check-labels/plot-trajectories: n_videos (cheap either way)
#   create-labeled-video:    n_videos
#
# Formulas are PLACEHOLDERS pending calibration from the benchmarking
# harness (scripts/benchmark_resources.py) -- same caveat as moseq/
# miniscope's registries, nothing here has been measured against real DLC
# runs yet.
#
# gpus: `train` requests Sherlock's shared `gpu` partition (open to anyone
# with a Sherlock account, not illorent-specific -- see Sherlock's own "GPU
# nodes" docs) via estimate_resources.py's gpus/gpu_partition fields,
# emitting --partition=gpu --gpus=N instead of the illorent CPU partition.
# `run deeplabcut train ... --no-gpu` (once wired into cli/pipelines/
# deeplabcut.sh) falls back to illorent CPU-only with a warning -- useful
# if the gpu partition is backed up or for a quick CPU-only smoke test.
# evaluate/analyze-videos could similarly opt into gpu_partition/gpus later
# (DLC inference benefits from a GPU too) -- left CPU-only for now since
# training is the stage that actually needs it.
#
# Wall time isn't in scope here -- each stage's .sbatch file sets its own
# #SBATCH --time. illorent's own CPU stages are capped at 2-00:00:00 (the
# account's max); the shared `gpu` partition may have a different cap --
# unconfirmed, check via `sacctmgr show assoc` before relying on a long
# --time default for `train`.

stages:
  extract-frames:
    partition: illorent
    exclusive: false
    cores:
      formula: null
      min: 2
      max: 16
      fallback: 4
    mem_gb:
      formula: null
      min: 8
      max: 64
      fallback: 16

  create-training-dataset:
    partition: illorent
    exclusive: false
    cores:
      formula: null
      min: 2
      max: 8
      fallback: 4
    mem_gb:
      formula: null
      min: 8
      max: 32
      fallback: 16

  train:
    # CPU fallback partition, used when --no-gpu is passed (see note above).
    partition: illorent
    exclusive: false
    # Real GPU request: --partition=gpu --gpus=1 (Sherlock's shared GPU
    # partition -- confirmed from Sherlock's own docs, not a guess).
    gpus: 1
    gpu_partition: gpu
    cores:
      # --cpus-per-task alongside --gpus, matching Sherlock's own `-c 10 -G 1`
      # example -- not itself the GPU request.
      formula: null
      min: 4
      max: 16
      fallback: 8
    mem_gb:
      formula: null
      min: 16
      max: 128
      fallback: 32

  evaluate:
    partition: illorent
    exclusive: false
    cores:
      formula: null
      min: 2
      max: 8
      fallback: 4
    mem_gb:
      formula: null
      min: 8
      max: 32
      fallback: 16

  analyze-videos:
    partition: illorent
    exclusive: false
    cores:
      formula: null
      min: 2
      max: 16
      fallback: 4
    mem_gb:
      # Loads full video into memory frame-by-frame; rough: n_videos * 10GB.
      formula: "n_videos * 10"
      min: 16
      max: 256
      fallback: 32

  extract-outlier-frames:
    partition: illorent
    exclusive: false
    cores:
      formula: null
      min: 2
      max: 8
      fallback: 4
    mem_gb:
      formula: null
      min: 8
      max: 64
      fallback: 16

  check-labels:
    partition: illorent
    exclusive: false
    cores:
      formula: null
      min: 1
      max: 4
      fallback: 2
    mem_gb:
      formula: null
      min: 4
      max: 16
      fallback: 8

  create-labeled-video:
    partition: illorent
    exclusive: false
    cores:
      formula: null
      min: 2
      max: 8
      fallback: 4
    mem_gb:
      formula: null
      min: 8
      max: 64
      fallback: 16

  plot-trajectories:
    partition: illorent
    exclusive: false
    cores:
      formula: null
      min: 1
      max: 4
      fallback: 2
    mem_gb:
      formula: null
      min: 4
      max: 16
      fallback: 8

  export-model:
    partition: illorent
    exclusive: false
    cores:
      formula: null
      min: 1
      max: 4
      fallback: 2
    mem_gb:
      formula: null
      min: 4
      max: 32
      fallback: 8
