# Resource registry for the moseq pipeline.
# Read by estimate_resources.py (imported by submit_moseq.py at submission time).
#
# exclusive: false on all stages.
# extract: normal partition (fan-out, array tasks are light/embarrassingly parallel).
# All other stages: illorent (RAM- or CPU-heavy).
#
# Formulas reference metadata collected cheaply at submit time:
#   pca-fit/apply/changepoints: n_sessions (count of h5s in aggregate_results/)
#   kappa-scan:                 n_models, num_iter (from CLI args)
#   learn-model:                num_iter (from CLI args)
#
# Formulas are PLACEHOLDERS pending calibration from the benchmarking harness.
#
# Wall time isn't in scope here (this registry only covers partition/cores/
# mem_gb) -- each stage's .sbatch file sets its own #SBATCH --time, capped at
# 2-00:00:00 (the account's max). Override per invocation with --time if a
# specific run needs less.

stages:
  extract:
    partition: [illorent, normal]
    exclusive: false
    cores:
      formula: null
      min: 2
      max: 32
      fallback: 16
    mem_gb:
      formula: null
      min: 8
      max: 128
      fallback: 64

  aggregate:
    partition: [illorent, normal]
    exclusive: false
    cores:
      formula: null
      min: 2
      max: 32
      fallback: 8
    mem_gb:
      formula: null
      min: 8
      max: 64
      fallback: 32

  pca-fit:
    partition: illorent
    exclusive: false
    cores:
      # RAM-bound not CPU-bound; few cores, leave headroom for co-scheduling.
      formula: null
      min: 4
      max: 80
      fallback: 64
    mem_gb:
      # Full frame stack loaded for SVD; rough: n_sessions * 50GB.
      formula: "n_sessions * 50"
      min: 100
      max: 1400
      fallback: 400

  pca-apply:
    partition: illorent
    exclusive: false
    cores:
      formula: null
      min: 4
      max: 32
      fallback: 8
    mem_gb:
      formula: "n_sessions * 30"
      min: 50
      max: 1400
      fallback: 300

  changepoints:
    partition: [illorent, normal]
    exclusive: false
    cores:
      formula: null
      min: 4
      max: 32
      fallback: 8
    mem_gb:
      formula: "n_sessions * 20"
      min: 50
      max: 1400
      fallback: 200

  kappa-scan:
    partition: illorent
    exclusive: false
    cores:
      # ARHMM resampling is CPU-bound; n_models * num_iter drives total compute.
      formula: "min(128, max(16, n_models * num_iter // 50))"
      min: 16
      max: 256
      fallback: 128
    mem_gb:
      formula: null
      min: 50
      max: 1400
      fallback: 600

  learn-model:
    partition: illorent
    exclusive: false
    cores:
      formula: "min(64, max(16, num_iter // 20))"
      min: 16
      max: 256
      fallback: 128
    mem_gb:
      formula: null
      min: 50
      max: 1400
      fallback: 600
