# Resource registry for the moseq pipeline.
# Read by estimate_resources.py (imported by submit_moseq.py at submission time).
#
# exclusive: false on all stages.
# extract: normal partition (fan-out, array tasks are light/embarrassingly parallel).
# All other stages: illorent (RAM- or CPU-heavy).
#
# Formulas reference metadata collected cheaply at submit time:
#   pca-fit/apply/changepoints: n_sessions (count of h5s in aggregate_results/)
#   kappa-scan:                 n_models, num_iter (from CLI args)
#   learn-model:                num_iter (from CLI args)
#
# Formulas are PLACEHOLDERS pending calibration from the benchmarking harness.
#
# qos: optional per stage, omitted = Sherlock's own default QOS, no override.
# Set explicitly on kappa-scan/learn-model below because their --time
# genuinely exceeds the illorent account's default (`normal`) QOS MaxWall
# (2 days) -- not optional tuning, they cannot complete without a QOS that
# allows a longer walltime. `high_p` is the only other QOS this account
# currently has (see `sacctmgr show assoc`/`show qos` on Sherlock), and it
# also carries a MaxJobsPU=4 cap -- fine for the handful of long-running
# jobs a lab member typically has in flight at once, but don't default
# every stage to it just for the priority boost, that budget is shared
# across everyone using it concurrently. pca-fit's 2-day --time sits
# exactly at normal QOS's MaxWall boundary -- not a violation today, but
# worth revisiting if that stage's time budget ever grows.

stages:
  extract:
    partition: normal
    exclusive: false
    cores:
      formula: null
      min: 2
      max: 32
      fallback: 8
    mem_gb:
      formula: null
      min: 8
      max: 128
      fallback: 32

  aggregate:
    partition: illorent
    exclusive: false
    cores:
      formula: null
      min: 2
      max: 32
      fallback: 8
    mem_gb:
      formula: null
      min: 8
      max: 64
      fallback: 32

  pca-fit:
    partition: illorent
    exclusive: false
    cores:
      # RAM-bound not CPU-bound; few cores, leave headroom for co-scheduling.
      formula: null
      min: 4
      max: 80
      fallback: 64
    mem_gb:
      # Full frame stack loaded for SVD; rough: n_sessions * 50GB.
      formula: "n_sessions * 50"
      min: 100
      max: 1400
      fallback: 400

  pca-apply:
    partition: illorent
    exclusive: false
    cores:
      formula: null
      min: 4
      max: 32
      fallback: 8
    mem_gb:
      formula: "n_sessions * 30"
      min: 50
      max: 1400
      fallback: 300

  changepoints:
    partition: illorent
    exclusive: false
    cores:
      formula: null
      min: 4
      max: 32
      fallback: 8
    mem_gb:
      formula: "n_sessions * 20"
      min: 50
      max: 1400
      fallback: 200

  kappa-scan:
    partition: illorent
    exclusive: false
    # --time=7-00:00:00 (see kappa_scan.sbatch) exceeds normal QOS's 2-day
    # MaxWall -- this job cannot complete without high_p.
    qos: high_p
    cores:
      # ARHMM resampling is CPU-bound; n_models * num_iter drives total compute.
      formula: "min(128, max(16, n_models * num_iter // 50))"
      min: 16
      max: 256
      fallback: 128
    mem_gb:
      formula: null
      min: 50
      max: 1400
      fallback: 600

  learn-model:
    partition: illorent
    exclusive: false
    # --time=3-00:00:00 (see learn_model.sbatch) exceeds normal QOS's
    # 2-day MaxWall -- this job cannot complete without high_p.
    qos: high_p
    cores:
      formula: "min(64, max(16, num_iter // 20))"
      min: 16
      max: 256
      fallback: 128
    mem_gb:
      formula: null
      min: 50
      max: 1400
      fallback: 600
