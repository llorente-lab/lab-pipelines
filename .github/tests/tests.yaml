# Per-pipeline smoke tests run inside the freshly built Docker image.
# Read by .github/workflows/push-and-publish.yml's build-and-test job.
# Each entry is a shell command passed to `docker run --rm <image> bash -c <cmd>`.
#
# Adding tests for a new pipeline: add a key matching the pipeline's `name`
# in cli/pipelines.yaml and list the commands below it. No workflow edit needed.

tests:
  miniscope:
    # Core import chain: catches broken CaImAn installs, the headless-opencv
    # swap, and the numpy<2 ABI pin all at once.
    - >-
      python -c "
      import caiman, cv2, numpy, psutil, PIL, roifile, joblib, tqdm;
      assert int(numpy.__version__.split('.')[0]) < 2,
        f'numpy {numpy.__version__} >= 2, ABI pin regressed';
      print('ok: caiman', getattr(caiman, '__version__', 'unknown'),
            '| cv2', cv2.__version__, '| numpy', numpy.__version__)
      "
    # rclone is installed via apt, not pip -- verify it's on PATH since
    # motion_correct.py and sync.sh shell out to it directly.
    - rclone --version

  moseq:
    # Full moseq import chain + numpy ABI pin check.
    - >-
      python -c "
      import moseq2_extract, moseq2_pca, moseq2_model, moseq2_viz, moseq2_app,
             cv2, h5py, numpy;
      assert int(numpy.__version__.split('.')[0]) < 2,
        f'numpy {numpy.__version__} >= 2, ABI pin regressed';
      print('ok: cv2', cv2.__version__,
            '| h5py', h5py.__version__, '| numpy', numpy.__version__)
      "
