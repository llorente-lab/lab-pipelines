name: caiman-build

on:
  push:
    branches: [main]
    paths:
      - "miniscope/**"
      - ".github/workflows/caiman-build.yml"
  workflow_dispatch:
    inputs:
      caiman_ref:
        description: "CaImAn git ref to build (branch, tag, or commit)"
        required: false
        default: "main"

env:
  IMAGE: ghcr.io/athp18/caiman

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (load, don't push yet)
        uses: docker/build-push-action@v5
        with:
          context: miniscope
          platforms: linux/amd64
          build-args: |
            CAIMAN_REF=${{ github.event.inputs.caiman_ref || 'main' }}
          tags: caiman:ci-${{ github.sha }}
          load: true
          push: false
          cache-from: type=gha,scope=caiman
          cache-to: type=gha,scope=caiman,mode=max

      # miniscope/Dockerfile has no built-in smoke test today (unlike
      # moseq's), so this is the only gate. Mirrors the actual failure mode
      # worth catching here: CaImAn's own import chain succeeding, opencv
      # correctly swapped to headless, and the numpy<2 pin (needed for the
      # same C-ABI reasons as moseq) actually holding after CaImAn's install.
      - name: Smoke test built image
        run: |
          docker run --rm caiman:ci-${{ github.sha }} python -c "
          import caiman
          import cv2, numpy, psutil, PIL, roifile, joblib, tqdm
          assert int(numpy.__version__.split('.')[0]) < 2, f'numpy {numpy.__version__} >= 2, ABI pin regressed'
          assert 'headless' in cv2.__file__ or True  # cv2 doesn't expose build flavor directly; import succeeding + no libGL crash is the real signal
          print('smoke test OK: caiman', getattr(caiman, '__version__', 'unknown'), '| cv2', cv2.__version__, '| numpy', numpy.__version__)
          "
          # rclone is installed via apt/curl script, not pip -- verify it's
          # actually on PATH inside the image too, motion_correct.py and
          # sync.sh both shell out to it directly.
          docker run --rm caiman:ci-${{ github.sha }} rclone --version

      # Two tags, same reasoning as moseq-build.yml: immutable SHA for
      # traceability, :latest for what a human pulls when rebuilding
      # Sherlock's caiman.sif. Move IMAGE to an org namespace
      # (ghcr.io/llorente-lab/caiman) once org package-write access exists.
      - name: Tag and push
        run: |
          docker tag caiman:ci-${{ github.sha }} ${{ env.IMAGE }}:${{ github.sha }}
          docker tag caiman:ci-${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest
