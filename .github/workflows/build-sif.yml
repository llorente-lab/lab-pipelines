name: Build SIF

# Generic, multi-pipeline .sif builder. Reads the pipeline list straight
# from pipelines.yaml (repo root; same manifest cli/run and setup.sh
# use, via cli/manifest.sh's purpose-built reader -- not a general YAML
# parser, see that file's own header) instead of hardcoding one pipeline
# name, so adding a third/fourth pipeline to the manifest is enough to get
# it built here too, no workflow edit needed.
#
# Assumes each pipeline's Docker image lives at ghcr.io/athp18/<name>,
# matching the IMAGE convention in moseq-build.yml/caiman-build.yml --
# update the "Build SIF" step below if that ever stops being true for some
# pipeline.
#
# Builds run on the GH-hosted runner (root, no proot/ptrace involved in
# the squashfs step), sidestepping Sherlock's fixed `ulimit -u 512`
# fighting `apptainer pull`'s internal mksquashfs -- see moseq-build.yml's
# build-sif-release job for the fuller version of this (which also
# publishes to a GitHub Release for Sherlock to pull directly). This
# workflow is the lighter-weight manual variant: artifact-only, any
# pipeline, on demand.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag to build the .sif from (applies to every pipeline)"
        required: true
        default: "latest"

permissions:
  contents: read
  packages: read

jobs:
  # Separate job (not just a shell loop inside build) so each pipeline's
  # .sif builds in its own isolated runner/matrix entry -- one pipeline's
  # build failing doesn't take the others down with it (fail-fast: false
  # below), and they build in parallel instead of sequentially.
  discover:
    runs-on: ubuntu-24.04
    outputs:
      pipelines: ${{ steps.list.outputs.pipelines }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List pipelines from pipelines.yaml
        id: list
        run: |
          # shellcheck disable=SC1091
          source cli/manifest.sh
          names=()
          while IFS=: read -r p_name _ _ _ _ _; do
            [ -z "$p_name" ] && continue
            case "$p_name" in \#*) continue ;; esac
            names+=("\"$p_name\"")
          done < <(load_pipeline_manifest pipelines.yaml)
          json="[$(IFS=,; echo "${names[*]}")]"
          echo "pipelines=$json" >> "$GITHUB_OUTPUT"
          echo "discovered pipelines: $json"

  build:
    needs: discover
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        pipeline: ${{ fromJson(needs.discover.outputs.pipelines) }}
    steps:
      - name: Install Apptainer
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer

      # Only needed if ghcr.io/athp18/<pipeline> is private -- drop this
      # step if every pipeline's package is public. Uses the same PAT
      # pattern as moseq-build.yml's GHCR login; add GHCR_PAT under repo
      # Settings -> Secrets if it isn't already there (packages:read scope
      # is enough for pulling here, unlike the write scope the build/push
      # workflows need).
      - name: Log in to GHCR (for private images)
        if: ${{ secrets.GHCR_PAT != '' }}
        env:
          APPTAINER_DOCKER_USERNAME: athp18
          APPTAINER_DOCKER_PASSWORD: ${{ secrets.GHCR_PAT }}
        run: echo "APPTAINER_DOCKER_USERNAME=$APPTAINER_DOCKER_USERNAME" >> "$GITHUB_ENV" && echo "APPTAINER_DOCKER_PASSWORD=$APPTAINER_DOCKER_PASSWORD" >> "$GITHUB_ENV"

      - name: Build SIF for ${{ matrix.pipeline }}
        run: |
          apptainer build \
            "${{ matrix.pipeline }}.sif" \
            "docker://ghcr.io/athp18/${{ matrix.pipeline }}:${{ github.event.inputs.tag }}"

      - name: Inspect SIF
        run: |
          ls -lh "${{ matrix.pipeline }}.sif"
          apptainer inspect "${{ matrix.pipeline }}.sif"

      - name: Upload SIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.pipeline }}-${{ github.event.inputs.tag }}.sif"
          path: "${{ matrix.pipeline }}.sif"
          retention-days: 7
