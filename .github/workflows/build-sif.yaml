name: Build and Deploy SIF

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Docker image tag
        required: true
        default: latest

env:
  IMAGE: ghcr.io/athp18/moseq

jobs:
  build:
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Apptainer
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer

      - name: Show versions
        run: |
          apptainer version

      - name: Build SIF
        run: |
          apptainer build \
            moseq.sif \
            docker://${IMAGE}:${{ github.event.inputs.tag }}

      - name: Verify image
        run: |
          ls -lh moseq.sif
          apptainer inspect moseq.sif

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.SHERLOCK_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan \
            -H "${{ secrets.SHERLOCK_HOST }}" \
            >> ~/.ssh/known_hosts

      - name: Create destination
        run: |
          ssh \
            ${{ secrets.SHERLOCK_USER }}@${{ secrets.SHERLOCK_HOST }} \
            "mkdir -p /scratch/groups/illorent/containers/moseq"

      - name: Upload SIF
        run: |
          scp \
            moseq.sif \
            ${{ secrets.SHERLOCK_USER }}@${{ secrets.SHERLOCK_HOST }}:/scratch/groups/illorent/containers/moseq/moseq-${{ github.event.inputs.tag }}.sif

      - name: Upload GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: moseq-sif-${{ github.event.inputs.tag }}
          path: moseq.sif
          retention-days: 7