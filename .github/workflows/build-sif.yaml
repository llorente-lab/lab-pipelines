name: Build and Deploy SIF

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag"
        required: true
        default: "v06.6"

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Apptainer
        run: |
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer

      - name: Login to GHCR
        if: ${{ secrets.GHCR_PAT != '' }}
        run: |
          echo "${{ secrets.GHCR_PAT }}" | \
            apptainer registry login \
            --username ${{ github.actor }} \
            --password-stdin oras://ghcr.io

      - name: Build SIF
        run: |
          apptainer build \
            moseq.sif \
            docker://ghcr.io/athp18/moseq:${{ github.event.inputs.tag }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SHERLOCK_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ${{ secrets.SHERLOCK_HOST }} >> ~/.ssh/known_hosts

      - name: Upload to Sherlock
        run: |
          scp moseq.sif \
            ${{ secrets.SHERLOCK_USER }}@${{ secrets.SHERLOCK_HOST }}:/scratch/groups/illorent/containers/moseq/moseq-gh.sif
