name: moseq-build

# Builds the Moseq container on every change to moseq/** (or the 8 vendored
# source packages, if they ever move into this repo), runs the same smoke
# test that's baked into the Dockerfile as a real CI gate (not just at image
# build time), and only pushes to GHCR if it passes. Manual trigger
# (workflow_dispatch) is also available for rebuilding without a code change,
# e.g. to pick up a base-image security patch.

on:
  push:
    branches: [main]
    paths:
      - "moseq/**"
      - ".github/workflows/moseq-build.yml"
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/athp18/moseq

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: athp18
          password: ${{ secrets.MOSEQ_TOKEN }}

      # Build for the amd64 Sherlock target, but load it into the local
      # Docker daemon instead of pushing -- we want a chance to fail the
      # smoke test below before anything reaches GHCR. Buildx layer cache
      # keyed on GITHUB_REF so unrelated branches don't evict each other's
      # cache and every build isn't a full from-scratch conda/pip rebuild.
      - name: Build image (load, don't push yet)
        uses: docker/build-push-action@v5
        with:
          context: moseq
          platforms: linux/amd64
          build-args: |
            VERSION=${{ github.sha }}
          tags: moseq:ci-${{ github.sha }}
          load: true
          push: false
          cache-from: type=gha,scope=moseq
          cache-to: type=gha,scope=moseq,mode=max

      # Redundant with the Dockerfile's own RUN-time smoke test in one sense,
      # but running it again here, explicitly, as a separate CI step means a
      # green Actions run is a real gate future-us can point to ("did CI pass
      # on this SHA") rather than relying on `docker build` not having
      # exited nonzero. Same import list as the Dockerfile's built-in check.
      - name: Smoke test built image
        run: |
          docker run --rm moseq:ci-${{ github.sha }} python -c "
          import moseq2_extract, moseq2_pca, moseq2_model, moseq2_viz, moseq2_app
          import cv2, h5py, numpy
          assert int(numpy.__version__.split('.')[0]) < 2, f'numpy {numpy.__version__} >= 2, ABI pin regressed'
          print('smoke test OK: cv2', cv2.__version__, '| h5py', h5py.__version__, '| numpy', numpy.__version__)
          "

      # Only reachable if the smoke test above exited 0. Two tags: the
      # immutable commit SHA (for traceability -- "which image is running"
      # always maps back to one commit) and :latest (what a human pulls by
      # default when rebuilding Sherlock's moseq.sif). No mid-version
      # hand-picked tags like v02/v03 anymore -- see env_setup.sh's move to
      # a single non-versioned moseq.sif on the Sherlock side.
      #
      # Pushing under the athp18 personal namespace for now, same as the
      # manual pushes so far -- move IMAGE to an org namespace
      # (ghcr.io/llorente-lab/moseq) once org package-write access is set up,
      # this is the one line that needs to change.
      - name: Tag and push
        run: |
          docker tag moseq:ci-${{ github.sha }} ${{ env.IMAGE }}:${{ github.sha }}
          docker tag moseq:ci-${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  # Builds the .sif on the GH-hosted runner (root, no proot/ptrace involved
  # in the squashfs step) and publishes it as a GitHub Release asset --
  # sidesteps two separate Sherlock-side pain points from this repo's
  # history: (1) Sherlock's fixed ulimit -u 512 combined with unprivileged
  # apptainer wrapping mksquashfs in proot, which can exceed that thread
  # ceiling even at modest core counts (see moseq/extract/*.sbatch commit
  # history / conversation notes), and (2) manually running
  # `apptainer build --sandbox` locally for dev-testing takes a long time
  # and ties up an interactive allocation the whole time. With this job,
  # Sherlock only ever does a plain `curl`/`gh release download` of an
  # already-built .sif -- no local apptainer build/pull needed at all for
  # the common case.
  build-sif-release:
    needs: build-test-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Install Apptainer
        run: |
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer

      # Build straight from the image we just pushed above (by digest/sha
      # tag, not :latest, so this job always builds the .sif that matches
      # this exact commit even if another push races in between).
      - name: Build .sif from the just-pushed image
        env:
          APPTAINER_DOCKER_USERNAME: athp18
          APPTAINER_DOCKER_PASSWORD: ${{ secrets.MOSEQ_TOKEN }}
        run: |
          apptainer build moseq.sif docker://${{ env.IMAGE }}:${{ github.sha }}

      # Single rolling release (tag reused every run, not one release per
      # commit) -- matches the "single non-versioned moseq.sif on Sherlock"
      # philosophy already used for MOSEQ_SIF/MOSEQ_SIF_OVERRIDE: there's
      # one canonical "latest built .sif" to pull, not a growing list of
      # per-commit releases to prune later.
      - name: Publish .sif to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: moseq-sif-latest
          name: "moseq.sif (latest, built from ${{ github.sha }})"
          body: "Auto-built from commit ${{ github.sha }}. Pull on Sherlock with: gh release download moseq-sif-latest --repo llorente-lab/lab-pipelines --pattern moseq.sif --clobber"
          files: moseq.sif
          token: ${{ secrets.MOSEQ_TOKEN }}
