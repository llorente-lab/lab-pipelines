name: moseq-build

# Builds the Moseq container on every change to moseq/** (or the 8 vendored
# source packages, if they ever move into this repo), runs the same smoke
# test that's baked into the Dockerfile as a real CI gate (not just at image
# build time), and only pushes to GHCR if it passes. Manual trigger
# (workflow_dispatch) is also available for rebuilding without a code change,
# e.g. to pick up a base-image security patch.
#
# Deliberately does NOT touch Sherlock. Pulling the new image onto Sherlock
# and swapping it into place (apptainer pull ... containers/moseq/moseq.sif)
# stays a manual step -- see moseq/common/env_setup.sh's comment on why an
# auto-pull-on-Sherlock daemon was considered and rejected: containers are
# an entire environment, and swapping one out from under an in-flight
# --exclusive job on the lab's single node is worse for reproducibility
# than a deliberate, visible pull.

on:
  push:
    branches: [main]
    paths:
      - "moseq/**"
      - ".github/workflows/moseq-build.yml"
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/athp18/moseq

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build for the amd64 Sherlock target, but load it into the local
      # Docker daemon instead of pushing -- we want a chance to fail the
      # smoke test below before anything reaches GHCR. Buildx layer cache
      # keyed on GITHUB_REF so unrelated branches don't evict each other's
      # cache and every build isn't a full from-scratch conda/pip rebuild.
      - name: Build image (load, don't push yet)
        uses: docker/build-push-action@v5
        with:
          context: moseq
          platforms: linux/amd64
          build-args: |
            VERSION=${{ github.sha }}
          tags: moseq:ci-${{ github.sha }}
          load: true
          push: false
          cache-from: type=gha,scope=moseq
          cache-to: type=gha,scope=moseq,mode=max

      # Redundant with the Dockerfile's own RUN-time smoke test in one sense,
      # but running it again here, explicitly, as a separate CI step means a
      # green Actions run is a real gate future-us can point to ("did CI pass
      # on this SHA") rather than relying on `docker build` not having
      # exited nonzero. Same import list as the Dockerfile's built-in check.
      - name: Smoke test built image
        run: |
          docker run --rm moseq:ci-${{ github.sha }} python -c "
          import moseq2_extract, moseq2_pca, moseq2_model, moseq2_viz, moseq2_app
          import cv2, h5py, numpy
          assert int(numpy.__version__.split('.')[0]) < 2, f'numpy {numpy.__version__} >= 2, ABI pin regressed'
          print('smoke test OK: cv2', cv2.__version__, '| h5py', h5py.__version__, '| numpy', numpy.__version__)
          "

      # Only reachable if the smoke test above exited 0. Two tags: the
      # immutable commit SHA (for traceability -- "which image is running"
      # always maps back to one commit) and :latest (what a human pulls by
      # default when rebuilding Sherlock's moseq.sif). No mid-version
      # hand-picked tags like v02/v03 anymore -- see env_setup.sh's move to
      # a single non-versioned moseq.sif on the Sherlock side.
      #
      # Pushing under the athp18 personal namespace for now, same as the
      # manual pushes so far -- move IMAGE to an org namespace
      # (ghcr.io/llorente-lab/moseq) once org package-write access is set up,
      # this is the one line that needs to change.
      - name: Tag and push
        run: |
          docker tag moseq:ci-${{ github.sha }} ${{ env.IMAGE }}:${{ github.sha }}
          docker tag moseq:ci-${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest
