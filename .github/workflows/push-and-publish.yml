name: push-and-publish

# Single workflow that drives every pipeline end-to-end:
#   discover → build-and-test (every push) → tag-push-publish (main only)
#
# The pipeline matrix is read from cli/pipelines.yaml so adding a new pipeline
# only requires an entry there -- no workflow edit needed.
# Test commands are read from .github/tests/tests.yaml at build time.

on:
  push:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      tag_override:
        description: "Override the image tag used when building the SIF (default: the commit SHA)"
        required: false
        default: ""

jobs:
  # ── 1. Discover ─────────────────────────────────────────────────────────────
  # Reads cli/pipelines.yaml and emits a JSON matrix of pipeline objects so
  # build-and-test doesn't need to know about individual pipelines at all.
  discover:
    runs-on: ubuntu-24.04
    outputs:
      pipelines: ${{ steps.parse.outputs.pipelines }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse pipelines.yaml into matrix JSON
        id: parse
        run: |
          pipelines=$(python3 - << 'EOF'
          import yaml, json, sys
          with open("cli/pipelines.yaml") as f:
              data = yaml.safe_load(f)
          result = []
          for p in data["pipelines"]:
              build_args = p.get("build_args") or {}
              # Newline-separated KEY=VALUE string for docker/build-push-action
              args_lines = "\n".join(f"{k}={v}" for k, v in build_args.items())
              result.append({
                  "name":         p["name"],
                  "context":      p["context"],
                  "image":        p["image"],
                  "release_name": p.get("release_name", p["name"]),
                  "build_args":   args_lines,
              })
          print(json.dumps(result))
          EOF
          )
          echo "pipelines=$pipelines" >> "$GITHUB_OUTPUT"
          echo "discovered: $pipelines"

  # ── 2. Build and test ───────────────────────────────────────────────────────
  # One matrix entry per pipeline. Builds the image locally (no push yet),
  # then runs the test commands from .github/tests/tests.yaml against it.
  # Runs on every push to every branch -- the gate before anything goes to GHCR.
  build-and-test:
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        pipeline: ${{ fromJson(needs.discover.outputs.pipelines) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login is needed even here so cache-from/cache-to can read/write GHA cache.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build image (load, don't push yet)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.pipeline.context }}
          platforms: linux/amd64
          build-args: |
            ${{ matrix.pipeline.build_args }}
            BUILD_SHA=${{ github.sha }}
          tags: ${{ matrix.pipeline.name }}:ci-${{ github.sha }}
          load: true
          push: false
          cache-from: type=gha,scope=${{ matrix.pipeline.name }}
          cache-to: type=gha,scope=${{ matrix.pipeline.name }},mode=max

      - name: Run tests
        env:
          PIPELINE: ${{ matrix.pipeline.name }}
        run: |
          image="${PIPELINE}:ci-${{ github.sha }}"

          # Extract this pipeline's test commands from tests.yaml
          python3 - "$PIPELINE" << 'EOF' > /tmp/test_cmds.txt
          import yaml, sys
          name = sys.argv[1]
          with open(".github/tests/tests.yaml") as f:
              data = yaml.safe_load(f)
          for cmd in data.get("tests", {}).get(name, []):
              print(cmd)
          EOF

          # Run each command inside the freshly built image.
          # Uses a bash herestring (<<< "$cmd") so multi-line commands work
          # correctly -- avoids the quoting issues of bash -c "$cmd".
          while IFS= read -r cmd; do
              [ -z "$cmd" ] && continue
              echo "==> $cmd"
              docker run --rm -i "$image" bash <<< "$cmd"
          done < /tmp/test_cmds.txt

  # ── 3. Tag, push, build SIF, publish ────────────────────────────────────────
  # Only runs on main. Tags the image with both :sha and :latest, pushes to
  # GHCR, builds a .sif with Apptainer, and publishes it as a rolling GitHub
  # Release (<name>-sif-latest) so Sherlock can `gh release download` it
  # instead of running apptainer pull locally.
  tag-push-publish:
    needs: [discover, build-and-test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        pipeline: ${{ fromJson(needs.discover.outputs.pipelines) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # Rebuild from cache -- the build-and-test job already populated
      # the GHA cache, so this is essentially instant (cache hit).
      - name: Build image (load from cache)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.pipeline.context }}
          platforms: linux/amd64
          build-args: |
            ${{ matrix.pipeline.build_args }}
            BUILD_SHA=${{ github.sha }}
          tags: ${{ matrix.pipeline.name }}:ci-${{ github.sha }}
          load: true
          push: false
          cache-from: type=gha,scope=${{ matrix.pipeline.name }}

      - name: Tag and push to GHCR
        run: |
          image="${{ matrix.pipeline.name }}:ci-${{ github.sha }}"
          remote="${{ matrix.pipeline.image }}"
          docker tag "$image" "${remote}:${{ github.sha }}"
          docker tag "$image" "${remote}:latest"
          docker push "${remote}:${{ github.sha }}"
          docker push "${remote}:latest"

      - name: Install Apptainer
        run: |
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer

      - name: Build SIF
        env:
          APPTAINER_DOCKER_USERNAME: ${{ github.actor }}
          APPTAINER_DOCKER_PASSWORD: ${{ secrets.GHCR_PAT }}
        run: |
          tag="${{ github.event.inputs.tag_override || github.sha }}"
          apptainer build \
            "${{ matrix.pipeline.name }}.sif" \
            "docker://${{ matrix.pipeline.image }}:${tag}"

      - name: Publish SIF to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.pipeline.name }}-sif-latest
          name: "${{ matrix.pipeline.release_name }} (built from ${{ github.sha }})"
          body: "Auto-built from commit ${{ github.sha }}."
          files: ${{ matrix.pipeline.name }}.sif
          token: ${{ secrets.GHCR_PAT }}
